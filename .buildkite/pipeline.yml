steps:
  - label: ":rust: check"
    key: "check"
    agents:
      queue: "getafix"
    env:
      BUILDKITE_PLUGIN_FS_CACHE_FOLDER: "/var/lib/buildkite-agent/.local/buildkite-agent/cache"
    plugins:
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/var/lib/buildkite-agent/.cargo/registry"
          restore: file
          save: file
          key-extra: "cargo-registry"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/var/lib/buildkite-agent/.cargo/git"
          restore: file
          save: file
          key-extra: "cargo-git"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "target"
          restore: file
          save: file
          key-extra: "cargo-target-check"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "mise.toml"
          path: "/var/lib/buildkite-agent/.local/share/mise"
          restore: file
          save: file
          key-extra: "mise-data"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise exec -- make check"

  - label: ":rust: test"
    key: "test-rust"
    depends_on: "check"
    agents:
      queue: "getafix"
    env:
      BUILDKITE_PLUGIN_FS_CACHE_FOLDER: "/var/lib/buildkite-agent/.local/buildkite-agent/cache"
    plugins:
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/var/lib/buildkite-agent/.cargo/registry"
          restore: file
          save: file
          key-extra: "cargo-registry"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/var/lib/buildkite-agent/.cargo/git"
          restore: file
          save: file
          key-extra: "cargo-git"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "target"
          restore: file
          save: file
          key-extra: "cargo-target-test"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "mise.toml"
          path: "/var/lib/buildkite-agent/.local/share/mise"
          restore: file
          save: file
          key-extra: "mise-data"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise exec -- make test-rust"

  - label: ":python: compile"
    key: "test-py"
    depends_on: "check"
    agents:
      queue: "getafix"
    env:
      BUILDKITE_PLUGIN_FS_CACHE_FOLDER: "/var/lib/buildkite-agent/.local/buildkite-agent/cache"
    plugins:
      - cache#v1.8.1:
          manifest: "mise.toml"
          path: "/var/lib/buildkite-agent/.local/share/mise"
          restore: file
          save: file
          key-extra: "mise-data"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise exec -- make test-py"

  - label: ":docs: build"
    key: "docs"
    depends_on: "check"
    agents:
      queue: "getafix"
    env:
      BUILDKITE_PLUGIN_FS_CACHE_FOLDER: "/var/lib/buildkite-agent/.local/buildkite-agent/cache"
    plugins:
      - cache#v1.8.1:
          manifest: "mise.toml"
          path: "/var/lib/buildkite-agent/.local/share/mise"
          restore: file
          save: file
          key-extra: "mise-data"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "python/pyproject.toml"
          path: "/var/lib/buildkite-agent/.cache/uv"
          restore: file
          save: file
          key-extra: "uv-cache"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise exec -- make docs-build"
